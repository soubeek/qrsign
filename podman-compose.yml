services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkflow
      POSTGRES_USER: checkflow
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    command: pnpm dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app
      - ./data:/data
    environment:
      DATABASE_URL: postgresql://checkflow:secret@postgres:5432/checkflow
      PDF_STORAGE_PATH: /data/pdfs
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    depends_on:
      - postgres

  public:
    build: ./apps/public
    command: pnpm dev --port 5174 --host
    ports:
      - "5174:5174"
    volumes:
      - ./apps/public:/app

  admin:
    build: ./apps/admin
    command: pnpm dev --port 5173 --host
    ports:
      - "5173:5173"
    volumes:
      - ./apps/admin:/app

volumes:
  postgres_data:
