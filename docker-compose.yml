services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: checkflow
      POSTGRES_USER: checkflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: ./apps/api
    volumes:
      - ./data:/data
    environment:
      DATABASE_URL: postgresql://checkflow:${POSTGRES_PASSWORD}@postgres:5432/checkflow
      PDF_STORAGE_PATH: /data/pdfs
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      NODE_ENV: production
    depends_on:
      - postgres
    restart: always

  public:
    build: ./apps/public
    restart: always

  admin:
    build: ./apps/admin
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - public
      - admin
    restart: always

volumes:
  postgres_data:
