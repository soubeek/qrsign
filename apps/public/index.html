<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CheckFlow - Accueil</title>
  </head>
  <body>
    <div id="landscape-warning">
      <div class="rotate-icon">📱</div>
      <div style="font-size: 20px; font-weight: 600;">Tournez votre appareil</div>
      <div style="font-size: 14px; opacity: 0.7;">CheckFlow fonctionne en mode portrait</div>
    </div>
    <div id="app"></div>
    <script>
      // If this public HTML is served for /admin (via stale SW cache), escape
      if (location.pathname.startsWith('/admin')) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
          location.reload();
        });
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
